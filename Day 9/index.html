<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Exercice DOM Débutant</title>
</head>
<body>

  <h1 id="titre">Titre original</h1>

  <p id="paragraphe">
    Ceci est le paragraphe original.
  </p>

  <button id="btnChanger">Changer le contenu</button>

  <script>
    //  Récupérer les éléments du DOM
    // (document.getElementById("titre")) 
    // Search the page for an item that has id="titre"
    const titre = document.getElementById("titre");
    const paragraphe = document.getElementById("paragraphe");
    const bouton = document.getElementById("btnChanger");

    // Ajouter un événement click au bouton
    // When the user presses the button execute the code inside the function
    bouton.addEventListener("click", function () {
      // Changer le texte du titre
      titre.textContent = "Nouveau titre avec JavaScript";

      // Changer la couleur du titre
      titre.style.color = "blue";

      // Changer le texte du paragraphe
      paragraphe.textContent = "Le paragraphe a été modifié avec le DOM.";
    });
  </script>

</body>
</html>
