<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Exercice DOM Intermédiaire</title>
</head>
<body>

  <h1>Liste des technologies</h1>

  <ul id="liste"></ul>

  <script>
    // Récupérer la liste vide
   const liste = document.getElementById("liste");
// Créer un tableau de technologies
const technologies = ["HTML", "CSS", "JavaScript"];

technologies.forEach(function(tech) {
    // tech représente chaque élément du tableau technologies (`tech` is not a new concept in HTML. It's simply a temporary variable within `forEach`)
    // It holds the current item being processed in the array. In this case, it will take on the values "HTML", "CSS", and "JavaScript" as the loop iterates through the `technologies` array
  console.log("tech actuelle:", tech);

  const li = document.createElement("li");

  li.textContent = tech;

  liste.appendChild(li);
});
  </script>

</body>
</html>
